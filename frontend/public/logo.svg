<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Network nodes: left, right, bottom — bold and clear at 16px -->
  <circle cx="9"  cy="11" r="3"   fill="url(#pulse)"/>
  <circle cx="23" cy="11" r="3"   fill="url(#pulse)"/>
  <circle cx="16" cy="23" r="3.5" fill="url(#pulse)"/>

  <!-- Connectors: fully opaque, thick enough to survive 16px rendering -->
  <line x1="9"  y1="11" x2="23" y2="11" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.9"/>
  <line x1="9"  y1="11" x2="16" y2="23" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.9"/>
  <line x1="23" y1="11" x2="16" y2="23" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.9"/>

  <!-- Pulse ring on bottom node — adds "active/AI" feel -->
  <circle cx="16" cy="23" r="6" stroke="white" stroke-width="1.2" opacity="0.25" fill="none"/>
</svg>
